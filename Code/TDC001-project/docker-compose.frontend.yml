services:
  tdc_frontend:
    #network_mode: "host" not needed for most things, unclear as to what this entirely does, but the port bridge below works just fine
    build:
      context: ./Gui # path to Dockerfile.gui
      dockerfile: Dockerfile.gui
    image: tdc001-gui              # cache tag
    container_name: tdc_frontend
    environment:
      # override if your backend is elsewhere
      - TZ=America/New_York
    ports:
      - "6080:6080"                # http://localhost:6080 shows the GUI

